services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: otto_web
      POSTGRES_USER: otto
      POSTGRES_PASSWORD: otto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otto -d otto_web"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: >
      sh -c "
      npm install &&
      npx prisma generate &&
      npx prisma db push &&
      npm run prisma:seed &&
      npm run dev
      "

volumes:
  postgres_data:
